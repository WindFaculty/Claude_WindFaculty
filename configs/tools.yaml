# Safe Shell execution policies for safe_bash.py

allowed:
  - python scripts/context/select_context.py
  - python scripts/context/semble_adapter.py
  - python scripts/bootstrap/verify_environment.py
  - python scripts/validate/validate_diff.py
  - python scripts/validate/validate_secrets.py
  - python scripts/tools/safe_test.py
  - python -m pytest
  - python -m py_compile
  - pytest
  - git status
  - git diff
  - git log
  - git branch
  - rg
  - grep
  - ruff check
  - mypy
  - npm test

ask:
  - git checkout
  - git restore
  - git clean
  - pip install
  - npm install
  - pnpm install
  - uv sync

deny:
  - rm -rf
  - del /s
  - format
  - shutdown
  - reboot
  - sudo
  - chmod -R 777
  - curl | bash
  - wget | bash
  - git push --force
  - git reset --hard
