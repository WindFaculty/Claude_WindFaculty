# Context collection and AST compression settings

limits:
  max_files_selected: 20
  warning_files_selected: 12
  max_file_size_bytes: 1048576  # 1MB

search:
  depth_limit: 3
  exclude_patterns:
    - "**/node_modules/**"
    - "**/__pycache__/**"
    - "**/.git/**"
    - "**/build/**"
    - "**/dist/**"
    - "**/.pytest_cache/**"

compression:
  enable_compactor: true
  compact_level: "medium"  # low, medium, high

# Semble semantic search configurations
semble:
  enable: true
  top_k: 10
  cache_dir: ".cache/semble"

# Engine routing for select_context.py
# default: engine used when --engine is not specified (or engine=auto).
# preferred: the engine auto mode will try first.
# fallback: the engine auto mode falls back to when preferred fails.
engines:
  default: "auto"
  preferred: "semble"
  fallback: "keyword"
